<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body>

<main layout:fragment="content">
    <div class="auth-wrapper">
        <div class="login-container">
            <div class="brand-section">
                <div class="brand-logo">✨</div>
                <h1 class="brand-title">Bem-vindo(a)</h1>
                <p class="brand-subtitle">Faça login para gerenciar seus agendamentos</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-actions">
                    <a th:href="@{/redefinir-senha}" class="forgot-link">Esqueci minha senha</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="btn-login">Entrar</button>
            </form>

            <div class="card-footer">
                Ainda não tem uma conta? <br>
                <a th:href="@{/cadastro}">Cadastre-se gratuitamente</a>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/pages/login.js}"></script>
</th:block>

</body>
</html>
