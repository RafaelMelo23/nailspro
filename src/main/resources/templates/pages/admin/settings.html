<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title>Configurações do Salão</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/pages/admin/settings.css}">
    </th:block>
</head>
<body>

<main layout:fragment="content">
    <div class="container">
        <!-- Profissionais Section -->
        <section class="admin-section">
            <div class="section-header">
                <h2>Equipe & Profissionais</h2>
                <button class="btn btn-primary btn-sm" onclick="adminSettingsApp.openProfessionalModal()">+ Nova Profissional</button>
            </div>
            <div class="card overflow-hidden">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Profissional</th>
                        <th>E-mail</th>
                        <th>Serviços</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                    </thead>
                    <tbody id="professionals-list">
                    <tr>
                        <td colspan="5" class="empty-state">Carregando profissionais...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Clientes Section -->
        <section class="admin-section">
            <div class="section-header">
                <h2>Gestão de Clientes (CRM)</h2>
                <div class="search-box">
                    <input type="text" id="client-search" placeholder="Buscar cliente..." oninput="adminSettingsApp.debounceSearchClients()">
                </div>
            </div>
            <div class="card overflow-hidden">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Histórico</th>
                        <th>Ação</th>
                    </tr>
                    </thead>
                    <tbody id="clients-list">
                    <tr>
                        <td colspan="4" class="empty-state">Carregando clientes...</td>
                    </tr>
                    </tbody>
                </table>
                <div id="clients-pagination" class="pagination"></div>
            </div>
        </section>

        <!-- Identidade Section -->
        <section class="admin-section">
            <div class="section-header">
                <h2>Identidade do Salão</h2>
            </div>
            <div class="card settings-card">
                <form id="salon-profile-form" onsubmit="adminSettingsApp.handleSaveProfile(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Nome Fantasia</label>
                            <input type="text" name="tradeName" class="form-input" th:value="${salon?.tradeName}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Slogan</label>
                            <input type="text" name="slogan" class="form-input" th:value="${salon?.slogan}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">WhatsApp Comercial</label>
                            <input type="text" name="comercialPhone" class="form-input" th:value="${salon?.comercialPhone}" placeholder="(00) 00000-0000">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Cor Primária</label>
                            <div class="color-picker-wrapper">
                                <input type="color" name="primaryColor" class="color-picker" th:value="${salon?.primaryColor ?: '#E91E63'}">
                                <input type="text" class="form-input color-text" th:value="${salon?.primaryColor ?: '#E91E63'}" readonly>
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">Endereço Completo</label>
                            <input type="text" name="fullAddress" class="form-input" th:value="${salon?.fullAddress}">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-block">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <!-- Professional Modal -->
    <div id="professional-modal" class="modal-overlay hidden" onclick="adminSettingsApp.closeProfessionalModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Novo Profissional</h3>
                <button class="btn-close" onclick="adminSettingsApp.closeProfessionalModal()">×</button>
            </div>
            <form id="professional-form" onsubmit="adminSettingsApp.handleCreateProfessional(event)">
                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" id="prof-name" class="form-input" placeholder="Ex: Mariana Garcia" required>
                </div>
                <div class="form-group">
                    <label class="form-label">E-mail (Login)</label>
                    <input type="email" id="prof-email" class="form-input" placeholder="mariana@email.com" required>
                    <small class="field-hint">Senha inicial padrão: <b>mudar123</b></small>
                </div>

                <div class="form-group">
                    <label class="form-label">Serviços que realiza:</label>
                    <div class="checkbox-group" id="services-checkbox-list">
                        <p class="empty-state">Carregando serviços...</p>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="adminSettingsApp.closeProfessionalModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="confirm-title">Confirmar Ação</h3>
            <p id="confirm-message" style="margin-top: 10px; color: var(--text-muted);"></p>
            <div class="modal-actions">
                <button type="button" id="confirm-cancel" class="btn btn-secondary">Cancelar</button>
                <button type="button" id="confirm-ok" class="btn btn-primary">Confirmar</button>
            </div>
        </div>
    </div>

</main>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/pages/admin/settings.js}"></script>
</th:block>

</body>
</html>
