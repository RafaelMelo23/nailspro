<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="tenant-style">
    <style th:inline="css" th:if="${salon?.primaryColor?.matches('^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$')}">
        :root {
            --primary: [(${salon.primaryColor})];
            --primary-hover: color-mix(in srgb, var(--primary), black 10%);
            --primary-light: color-mix(in srgb, var(--primary), white 85%);
        }
    </style>
</head>

<body>

<header th:fragment="header">
</header>

<footer th:fragment="footer">
</footer>

</body>
</html>
