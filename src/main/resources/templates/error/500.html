<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro no Servidor</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        :root {
            --primary: #E91E63;
        }
    </style>
</head>
<body>
    <main>
        <div class="container" style="text-align: center; padding: 60px 20px;">
            <div style="font-size: 80px; font-weight: 700; color: var(--status-busy, #EF4444); margin-bottom: 20px; opacity: 0.2;">500</div>
            <h1 style="font-size: 24px; margin-bottom: 10px;">Algo deu errado.</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Houve uma falha interna no servidor. Nossa equipe já foi notificada.</p>

            <div style="display: flex; flex-direction: column; gap: 12px; max-width: 280px; margin: 0 auto;">
                <a href="/agendar" class="btn btn-primary">Tentar Novamente</a>
                <button onclick="history.back()" class="btn btn-secondary">Voltar</button>
            </div>
        </div>
    </main>
</body>
</html>
