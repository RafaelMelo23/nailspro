spring.application.name=scheduling-nails-pro

############## Database
# jdbc:postgresql://host:port/database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nailspro_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.detect-encoding=false
spring.flyway.encoding=UTF-8
# --------------------------

support.whatsapp.number=${SUPPORT_WHATSAPP_NUMBER}

############## E-Mail (Removed from this version).
# spring.mail.host=${MAIL_HOST:localhost}
# spring.mail.port=${MAIL_PORT:25}
# spring.mail.username=${MAIL_USER}
# spring.mail.password=${MAIL_PASSWORD}
#
# resend.api.key=${RESEND_API_KEY}
# resend.email.address=${RESEND_EMAIL_ADDRESS}
# --------------------------

# Security Protocols
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

api.security.jwt.secret=${JWT_SECRET}
app.jwt.refreshExpirationMs=604800000
# --------------------------

############## Domain
domain.url=${DOMAIN_URL}
app.protocol.http=${APP_HTTP_PROTOCOL:http}
# --------------------------

################ Evolution API
evolution.url=${EVO_URL}
evolution.apikey=${EVO_API_KEY}
evolution.webhook.url=${EVO_WEBHOOK_URL:http://localhost:8080/api/v1/webhook}
# --------------------------

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate=${HIBERNATE_LOG_LEVEL:ERROR}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LEVEL:ERROR}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LEVEL:ERROR}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:INFO}

sentry.dsn=${SENTRY_DSN:}
sentry.sample-rate=${SENTRY_SAMPLE_RATE:0.1}
sentry.exception-resolver-order=-2147483648
sentry.send-default-pii=true
sentry.release=${SENTRY_RELEASE_VERSION:}
sentry.environment=${SENTRY_ENVIRONMENT:dev}
# API Documentation
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:false}

file.upload.dir=${UPLOADS_PATH:/var/nailspro/uploads}


# Thymeleaf & Static Resources
spring.thymeleaf.prefix=${THYMELEAF_PREFIX:classpath:/templates/}
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.check-template-location=true
spring.web.resources.static-locations=${STATIC_LOCATIONS:classpath:/static/}

################ Demo vars
demo.tenant=${DEMO_TENANT:demo-salon-2026}