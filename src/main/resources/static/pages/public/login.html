<link rel="stylesheet" href="/css/pages/login.css">

<main>
    <div class="auth-wrapper">
        <div class="login-container">
            <div class="brand-section">
                <div class="brand-logo">✨</div>
                <h1 class="brand-title" data-salon-field="tradeName">Bem-vindo(a)</h1>
                <p class="brand-subtitle" data-salon-field="slogan">Faça login para gerenciar seus agendamentos</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="forgot-link" onclick="loginApp.showRecoveryModal()" style="background: none; border: none; padding: 0; font-family: inherit; cursor: pointer;">Esqueci minha senha</button>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="btn-login">Entrar</button>
                
                <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px; color: var(--text-muted);">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <span style="font-size: 12px; font-weight: 500;">OU</span>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <button type="button" class="btn btn-secondary btn-block" id="btn-demo" onclick="loginApp.handleDemoLogin()">
                    ✨ Experimentar Modo Demonstração
                </button>
            </form>

            <div class="card-footer">
                Ainda não tem uma conta? <br>
                <a href="/cadastro">Cadastre-se gratuitamente</a>
            </div>
        </div>
    </div>

    <!-- Password Recovery Modal -->
    <div id="modal-recovery" class="modal-overlay hidden" onclick="loginApp.closeRecoveryModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-bottom: 10px;">Esqueceu sua senha?</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
                Para sua segurança, as senhas são recuperadas manualmente via WhatsApp.
            </p>
            
            <div class="form-group">
                <label class="form-label">Seu E-mail ou Nome</label>
                <input type="text" id="recovery-id" class="form-input" placeholder="Como podemos te identificar?">
            </div>

            <div class="modal-actions" style="display: flex; gap: 10px; margin-top: 25px;">
                <button type="button" class="btn btn-outline btn-block" onclick="loginApp.closeRecoveryModal()">Cancelar</button>
                <button type="button" class="btn btn-primary btn-block" onclick="loginApp.requestWhatsAppRecovery()">
                    Solicitar via WhatsApp
                </button>
            </div>
        </div>
    </div>
</main>

<script src="/js/pages/login.js"></script>
