<div id="tab-blocks" class="tab-content">
    <div class="card">
        <div class="card-header">
            <div class="header-flex">
                <div>
                    <h3>Bloqueios de Agenda</h3>
                    <p>Gerencie datas e horários em que você não estará disponível para agendamentos (ex: folgas extras, compromissos pessoais).</p>
                </div>
                <button class="btn btn-primary" onclick="professionalScheduleApp.openBlockModal()">Adicionar Bloqueio</button>
            </div>
        </div>
        <div class="card-body">
            <div id="blocks-list">
                <div class="loading-placeholder">Carregando bloqueios...</div>
            </div>
        </div>
    </div>

</div>

<template id="block-item-template">
    <div class="block-item">
        <div class="block-info">
            <span class="block-reason"></span>
            <span class="block-time"></span>
        </div>
        <div class="block-actions">
            <button class="btn-delete-block" title="Excluir">Excluir</button>
        </div>
    </div>
</template>
