<!-- Generic confirmation modal -->
<div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div class="modal-header">
            <h2 id="confirm-modal-title">Confirmar Ação</h2>
        </div>
        <div class="modal-body" style="padding: 20px 0;">
            <p id="confirm-modal-message"></p>
        </div>
        <div class="form-actions" style="justify-content: center; gap: 12px; margin-top: 20px;">
            <button type="button" class="btn btn-secondary" id="confirm-modal-cancel">Cancelar</button>
            <button type="button" class="btn btn-primary" id="confirm-modal-ok">Confirmar</button>
        </div>
    </div>
</div>

<!-- Modal for block creation -->
<div id="block-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="block-modal-title">Adicionar Bloqueio</h2>
            <button class="modal-close" onclick="professionalScheduleApp.closeBlockModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="block-form">
                <input type="hidden" id="block-id">
                <div class="form-group">
                    <label class="form-label">Motivo (opcional)</label>
                    <input type="text" id="block-reason" class="form-input" placeholder="Ex: Férias, Médico, etc.">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="switch-container">
                            <input type="checkbox" id="block-whole-day" onchange="professionalScheduleApp.toggleWholeDay()">
                            <span class="switch-label">Dia Inteiro</span>
                        </label>
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Início</label>
                        <input type="datetime-local" id="block-start" class="form-input" required>
                    </div>
                    <div class="form-group" id="block-end-container" style="flex: 1;">
                        <label class="form-label">Término</label>
                        <input type="datetime-local" id="block-end" class="form-input" required>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 30px;">
                    <button type="button" class="btn btn-secondary" onclick="professionalScheduleApp.closeBlockModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="save-block-btn">Criar Bloqueio</button>
                </div>
            </form>
        </div>
    </div>
</div>
